<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="200" cy="200" r="180" fill="url(#bgGradient)"/>
  
  <!-- Code brackets symbol -->
  <g fill="white" opacity="0.9">
    <!-- Left bracket -->
    <path d="M 120 120 L 100 120 L 100 280 L 120 280" 
          stroke="white" stroke-width="12" stroke-linecap="round" 
          fill="none" opacity="0.95"/>
    
    <!-- Right bracket -->
    <path d="M 280 120 L 300 120 L 300 280 L 280 280" 
          stroke="white" stroke-width="12" stroke-linecap="round" 
          fill="none" opacity="0.95"/>
  </g>
  
  <!-- AI spark/lightning bolt -->
  <path d="M 200 140 L 180 200 L 210 200 L 190 260" 
        stroke="url(#accentGradient)" stroke-width="10" 
        stroke-linecap="round" stroke-linejoin="round"
        fill="none" opacity="0.95"/>
  
  <!-- Small accent circles representing code quality metrics -->
  <circle cx="230" cy="170" r="8" fill="#10b981" opacity="0.8"/>
  <circle cx="250" cy="200" r="6" fill="#06b6d4" opacity="0.8"/>
  <circle cx="240" cy="230" r="7" fill="#10b981" opacity="0.8"/>
  
  <!-- Brand name -->
  <text x="200" y="340" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="42" 
        font-weight="bold"
        fill="white" 
        text-anchor="middle"
        letter-spacing="2">
    CodeGeni
  </text>
  
  <!-- Tagline -->
  <text x="200" y="370" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="16" 
        fill="white" 
        text-anchor="middle"
        opacity="0.8"
        letter-spacing="1">
    AI Code Review
  </text>
</svg>
